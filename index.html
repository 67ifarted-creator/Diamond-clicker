<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Clicker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Welcome to Diamond Clicker!</h1>
    <div id="game">
        <div id="leaderboard">
            <h2>Leaderboard</h2>
            <ul>
                <li>Player 1: 100 Diamonds</li>
                <li>Player 2: 90 Diamonds</li>
            </ul>
        </div>
        <div id="buildings">
            <h2>Buildings</h2>
            <button onclick="buyBuilding('Mine')">Buy Mine (Cost: 50 Diamonds)</button>
            <button onclick="buyBuilding('Factory')">Buy Factory (Cost: 100 Diamonds)</button>
        </div>
        <div id="upgrades">
            <h2>Upgrades</h2>
            <button onclick="purchaseUpgrade('Speed')">Upgrade Click Speed (Cost: 20 Diamonds)</button>
        </div>
        <div id="achievements">
            <h2>Achievements</h2>
            <p>10 Clicks: <span id="clickAchievement">Unlocked</span></p>
        </div>
        <div id="chat">
            <h2>Chat</h2>
            <input type="text" id="chatInput" placeholder="Type your message..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
