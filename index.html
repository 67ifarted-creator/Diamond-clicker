<body>
    <h1>Welcome to Diamond Clicker!</h1>
    <p>Click the diamond to earn points!</p>
    <button id="diamond">💎</button>
    <script>
        const diamondButton = document.getElementById('diamond');
        let score = 0;

        diamondButton.addEventListener('click', () => {
            score++;
            alert('Score: ' + score);
        });
    <\/script>
