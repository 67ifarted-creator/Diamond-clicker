<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Clicker Game</title>
    <style>
        body {
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #diamond {
            font-size: 220px;
            display: block;
            margin: 20px auto;
            cursor: pointer;
        }
        #profile, #game {
            display: none;
        }
    </style>
</head>
<body>
    <div id="profile">
        <h1>Create Profile</h1>
        <input type="text" id="username" placeholder="Enter username" required>
        <select id="classSelect">
            <option value="Miner">Miner</option>
            <option value="Driller">Driller</option>
        </select>
        <button onclick="createProfile()">Create Profile</button>
    </div>

    <div id="game">
        <h1>Diamond Clicker Game</h1>
        <div id="diamond" onclick="collectDiamond()">💎</div>
        <p>Diamonds: <span id="diamondCount">0</span></p>
        <button onclick="upgrade()">Upgrade</button>
    </div>

    <script>
        let diamonds = 0;
        function createProfile() {
            let username = document.getElementById('username').value;
            let characterClass = document.getElementById('classSelect').value;
            if (username) {
                document.getElementById('profile').style.display = 'none';
                document.getElementById('game').style.display = 'block';
                alert(`Welcome ${username}, your character class is ${characterClass}!`);
            }
        }
        function collectDiamond() {
            diamonds++;
            document.getElementById('diamondCount').innerText = diamonds;
        }
        function upgrade() {
            alert("Upgrades feature coming soon!");
        }
        // Initial display
        document.getElementById('profile').style.display = 'block';
    </script>
